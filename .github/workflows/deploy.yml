name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: 145.223.77.119
          FTP_USER: ${{ secrets.HOSTINGER_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:max-retries 1;
            set net:timeout 30;
            set net:reconnect-interval-base 5;
            open -u ${FTP_USER},${FTP_PASS} ${FTP_HOST};
            cd public_html/cvmaker;
            mirror -R --verbose --delete --exclude-glob .git* --exclude-glob .github* --exclude-glob node_modules --exclude-glob vendor .;
            bye
          "
