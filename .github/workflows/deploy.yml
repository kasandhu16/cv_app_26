# GitHub Actions workflow to deploy a PHP application to Hostinger shared hosting using SFTP.
# This version redirects the SFTP command output to a log file for debugging.

name: Deploy to Hostinger via SFTP (with Logging)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, pdo, pdo_sqlite, pdo_mysql
        tools: composer

    - name: Install Composer Dependencies
      if: hashFiles('composer.json') != ''
      run: composer install --no-interaction --no-dev --optimize-autoloader

    - name: Install lftp SFTP Client
      run: sudo apt-get -y install lftp

    - name: Deploy files and create log
      # This step will run the lftp command and redirect its output to a file.
      # The `|| true` ensures that the workflow continues even if lftp fails,
      # so we can get the log file.
      run: |
        lftp -c "
        set sftp:auto-confirm yes;
        set sftp:debug 3;
        open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} -p ${{ secrets.SFTP_PORT }} sftp://${{ secrets.SFTP_HOST }};
        mirror -R -v -e ./ /public_html/cvmaker/;
        " > deployment_log.txt 2>&1 || true
      env:
        SFTP_HOST: ${{ secrets.SFTP_HOST }}
        SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: 65002

    - name: Upload log file as artifact
      # This step will upload the log file as a build artifact,
      # so you can download it from the GitHub Actions run page.
      uses: actions/upload-artifact@v4
      with:
        name: deployment-log
        path: deployment_log.txt
