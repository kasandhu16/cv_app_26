# GitHub Actions workflow to deploy a PHP application to Hostinger shared hosting using SFTP.
#
# HOW TO USE:
# 1. Ensure your GitHub repository secrets are set correctly:
#    - SFTP_HOST: dynapulsar.com
#    - SFTP_USERNAME: Your FTP/SSH username.
#    - SFTP_PASSWORD: Your main FTP password.
# 2. Push a change to the 'main' branch to trigger the deployment.
#

name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, pdo, pdo_sqlite, pdo_mysql
        tools: composer

    - name: Check for composer.json
      id: composer-check
      uses: andstor/file-existence-action@v2
      with:
        files: "composer.json"

    - name: Install Composer Dependencies
      if: steps.composer-check.outputs.files_exists == 'true'
      run: composer install --no-interaction --no-dev --optimize-autoloader

    - name: Deploy to Hostinger via SFTP
      uses: appleboy/sftp-action@v2.2.0
      with:
        host: ${{ secrets.SFTP_HOST }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        port: 65002 # Custom port for dynapulsar.com
        source: "./" # Deploy the entire project
        target: "/public_html/cvmaker/" # Your target directory
