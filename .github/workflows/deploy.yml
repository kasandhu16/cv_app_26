# GitHub Actions workflow to deploy a PHP application to Hostinger shared hosting.
#
# HOW TO USE:
# 1. Push your project to a GitHub repository.
# 2. In your GitHub repository, go to Settings > Secrets and variables > Actions.
# 3. Create the following secrets with your Hostinger FTP credentials:
#    - FTP_SERVER: Your FTP server address (e.g., ftp.hostinger.com)
#    - FTP_USERNAME: Your FTP username.
#    - FTP_PASSWORD: Your FTP password.
# 4. Push a change to the 'main' branch to trigger the deployment.
#

name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1' # Make sure this matches your Hostinger PHP version
        extensions: mbstring, pdo, pdo_sqlite, pdo_mysql
        tools: composer

    - name: Install Composer Dependencies
      run: composer install --no-interaction --no-dev --optimize-autoloader

    - name: Deploy to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.3
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # This is the directory on your server where files should be uploaded.
        # For Hostinger, it's usually 'public_html'.
        # If your app is in a subdirectory, use 'public_html/your_subdir'.
        server-dir: public_html/
