name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, dom, pdo, pdo_sqlite, sqlite3
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Composer Dependencies
        run: composer install --no-interaction --no-dev --optimize-autoloader

      - name: Deploy to Hostinger using rsync
        uses: burnett01/rsync-deploy@v6.0.0
        with:
          switches: -avzr --delete --exclude='/.git*' --exclude='/.github' --exclude='/deploy.php' --exclude='/deploy_log.txt' --exclude='/README.md'
          path: ./ # Source path
          remote_path: /home/u998578075/domains/dynapulsar.com/public_html/cvmaker # Destination path
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
