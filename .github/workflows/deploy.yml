# GitHub Actions workflow to deploy a PHP application to Hostinger shared hosting using SFTP.
# This version manually installs an SFTP client to avoid issues with resolving GitHub Actions.

name: Deploy to Hostinger via SFTP (Manual)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, pdo, pdo_sqlite, pdo_mysql
        tools: composer

    - name: Install Composer Dependencies
      if: hashFiles('composer.json') != ''
      run: composer install --no-interaction --no-dev --optimize-autoloader

    - name: Install lftp SFTP Client
      run: sudo apt-get -y install lftp

    - name: Deploy files via lftp
      run: |
        lftp -c "
        set sftp:auto-confirm yes;
        open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} -p ${{ secrets.SFTP_PORT }} sftp://${{ secrets.SFTP_HOST }};
        mirror -R -v -e ./ /public_html/cvmaker/;
        "
      env:
        SFTP_HOST: ${{ secrets.SFTP_HOST }}
        SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: 65002
