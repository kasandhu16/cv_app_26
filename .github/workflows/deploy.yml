# GitHub Actions workflow to deploy a PHP application to Hostinger shared hosting using SFTP.
#
# HOW TO USE:
# 1. In your Hostinger control panel, find your SFTP details. For dynapulsar.com, the port is 65002.
# 2. In your GitHub repository, go to Settings > Secrets and variables > Actions.
# 3. Create/update the following secrets:
#    - SFTP_HOST: dynapulsar.com
#    - SFTP_USERNAME: Your FTP/SSH username.
#    - SFTP_PASSWORD: Your main FTP password.
# 4. Push a change to the 'main' branch to trigger the deployment.
#

name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, pdo, pdo_sqlite, pdo_mysql
        tools: composer

    - name: Check for composer.json
      id: composer-check
      uses: andstor/file-existence-action@v2
      with:
        files: "composer.json"

    - name: Install Composer Dependencies
      if: steps.composer-check.outputs.files_exists == 'true' # Note: action outputs 'files_exists'
      run: composer install --no-interaction --no-dev --optimize-autoloader

    - name: Deploy to Hostinger via SFTP
      uses: lupin0121/action-sftp-deploy@v1.3.1
      with:
        host: ${{ secrets.SFTP_HOST }}
        port: 65002 # Custom port provided by webhost
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        source: './' # Deploy the entire repository
        target: '/public_html/cvmaker/' # Target directory on your Hostinger server
