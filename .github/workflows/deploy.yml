name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: 145.223.77.119
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          FTP_USER_SECRET: ${{ secrets.FTP_USER }}
          FTP_PASS_SECRET: ${{ secrets.FTP_PASSWORD }}
          FTP_USERNAME_SECRET: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD_SECRET: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -e
          FTP_USER="${HOSTINGER_USERNAME:-${FTP_USER_SECRET:-${FTP_USERNAME_SECRET}}}"
          FTP_PASS="${HOSTINGER_PASSWORD:-${FTP_PASS_SECRET:-${FTP_PASSWORD_SECRET}}}"
          echo "FTP_USER set=${FTP_USER:+yes} FTP_PASS set=${FTP_PASS:+yes}"
          if [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "ERROR: FTP username or password is empty. Check repository secrets."
            echo "Make sure one of these secrets is defined: HOSTINGER_USERNAME, FTP_USER, FTP_USERNAME"
            echo "And one of: HOSTINGER_PASSWORD, FTP_PASSWORD"
            exit 1
          fi
          lftp -u "${FTP_USER},${FTP_PASS}" "${FTP_HOST}" <<'EOF'
            set ftp:ssl-allow no
            set ftp:passive-mode on
            set net:max-retries 1
            set net:timeout 30
            set net:reconnect-interval-base 5
            cls public_html/cvmaker || mkdir public_html/cvmaker
            cd public_html/cvmaker
            mirror -R --verbose --delete --exclude-glob .git* --exclude-glob .github* --exclude-glob node_modules --exclude-glob vendor .
            bye
          EOF
